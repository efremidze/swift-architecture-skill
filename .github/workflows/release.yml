name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch, minor, major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must run from main, got ${GITHUB_REF}"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version tag
        id: bump
        run: |
          git fetch --tags
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Invalid bump: ${{ inputs.bump }}"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next_tag"

      - name: Create and push tag
        run: |
          git tag -a "${{ steps.bump.outputs.next_tag }}" -m "chore(release): ${{ steps.bump.outputs.next_tag }}"
          git push origin "${{ steps.bump.outputs.next_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.next_tag }}
          generate_release_notes: true
