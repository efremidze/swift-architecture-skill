name: Validate Skill

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install skills-ref CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"

      - name: Validate Skill
        run: |
          python -m skills_ref.cli validate ./swift-architecture-skill

  validate-testing-snippets:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate Swift Testing Snippets
        run: |
          ./scripts/validate-testing-snippets.sh

  validate-testing-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Testing Quality Contract
        run: |
          python3 ./scripts/validate-testing-quality.py

  validate-testing-benchmarks:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Testing Benchmark Suite
        run: |
          ./scripts/run-testing-benchmark-suite.py

  validate-architecture-consistency:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Architecture Consistency
        run: |
          python3 ./scripts/validate-architecture-consistency.py
