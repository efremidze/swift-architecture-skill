name: Validate Skill

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install skills-ref CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install skills-ref

      - name: Validate Skill
        run: |
          skills-ref validate ./swift-architecture-agent
